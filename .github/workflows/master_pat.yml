name: Deploy PAT to Azure Web App (OIDC - Auto)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PHP_VERSION: '8.2'               # PHP 8.2 è il minimo disponibile nella tua Web App
  AZURE_WEBAPP_NAME: 'PAT'         # nome esatto della Web App
  PACKAGE_PATH: '.'                # PAT ha index.php in root
  COMPOSER_ALLOW_SUPERUSER: '1'    # evita warning in CI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, openssl, json, xml, fileinfo, tokenizer, bcmath, ctype
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-${{ env.PHP_VERSION }}-

      - name: Validate Composer files
        run: composer validate --no-check-publish --no-interaction
        working-directory: ${{ env.PACKAGE_PATH }}

      - name: Install Composer dependencies (prod)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
        working-directory: ${{ env.PACKAGE_PATH }}

      - name: Show PHP modules (build-time)
        run: php -m | sort

      # LOGIN tramite OIDC usando i secrets generati automaticamente da Azure
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_18F927BB9DCB481B8BDA501936AA201C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A6A078E7BFA24BE1886EC9DD0EE3EBBA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C0B14473F214219B4E380CB83130251 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}

      # (Opzionale) Riavvio app dopo il deploy
      # - name: Restart Web App
      #   uses: azure/CLI@v2
      #   with:
      #     inlineScript: az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group <RG_NAME>
``
