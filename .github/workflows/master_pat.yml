name: Deploy PAT to Azure Web App (Publish Profile)

on:
  push:
    branches: [ master ]   # ← cambia se usi un branch diverso
  workflow_dispatch:

env:
  PHP_VERSION: '8.1'       # PAT è testata su PHP 8.0/8.1
  AZURE_WEBAPP_NAME: 'portale-amministrazione-trasparente'   # ← nome esatto della tua Web App
  PACKAGE_PATH: '.'        # entrypoint index.php nella root del repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, openssl, json, xml, fileinfo, tokenizer, bcmath, ctype
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies (prod)
        run: composer install --no-dev --prefer-dist --optimize-autoloader
        working-directory: ${{ env.PACKAGE_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PACKAGE_PATH }}
